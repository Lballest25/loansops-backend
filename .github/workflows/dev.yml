name: Deploy – Dev

on:
  push:
    branches:
      - develop

jobs:
  quality:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt black flake8 pylint mypy

      - name: Black (format check)
        run: black --check --line-length 79 .

      - name: Flake8 (lint)
        run: flake8 --config .code_quality/.flake8 .

      - name: Pylint
        run: pylint --rcfile .code_quality/.pylintrc shared/ src/ || true

      - name: MyPy (type check)
        run: mypy --config-file .code_quality/mypy.ini shared/ src/ || true

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: quality
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Lambda Layers
        run: bash scripts/build_layers.sh
        working-directory: loansops-backend

      - name: Set up Node.js (for Serverless Framework)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Deploy to dev
        run: serverless deploy --stage dev --verbose
        working-directory: loansops-backend

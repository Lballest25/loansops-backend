post:
  summary: Send a manual notification to a user.
  description: >
    Sends an email, WhatsApp message, or both to a specific user.
    ADMIN only.
  tags:
    - Notifications
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: './schema.json'
  responses:
    '201':
      description: Notification sent successfully.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Notification sent"
              results:
                type: object
                properties:
                  email:
                    type: object
                  whatsapp:
                    type: object
    '400':
      description: Missing or invalid fields.
    '401':
      description: Unauthorized.
    '403':
      description: Forbidden – ADMIN only.
    '404':
      description: User not found.
    '500':
      description: Internal server error.

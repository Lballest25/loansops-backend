get:
  summary: List users.
  description: Returns a paginated list of users. Accessible by ADMIN and ANALYST.
  tags:
    - Users
  parameters:
    - in: query
      name: role
      required: false
      schema:
        type: string
        enum: [ADMIN, ANALYST, CLIENT]
      description: Filter by role.
    - in: query
      name: active
      required: false
      schema:
        type: integer
        enum: [0, 1]
        default: 1
      description: Filter by active status.
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        default: 50
      description: Max number of results.
    - in: query
      name: offset
      required: false
      schema:
        type: integer
        default: 0
      description: Pagination offset.
  responses:
    '200':
      description: List of users.
      content:
        application/json:
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  type: object
              count:
                type: integer
    '401':
      description: Unauthorized.
    '403':
      description: Forbidden – insufficient role.
    '500':
      description: Internal server error.

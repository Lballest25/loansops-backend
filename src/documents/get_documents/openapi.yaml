get:
  summary: List documents for a loan.
  description: Returns all documents associated with a loan. CLIENTs can only list documents from their own loans.
  tags:
    - Documents
  parameters:
    - in: path
      name: loan_id
      required: true
      schema:
        type: string
      description: UUID of the loan.
  responses:
    '200':
      description: List of documents.
      content:
        application/json:
          schema:
            type: object
            properties:
              documents:
                type: array
                items:
                  type: object
                  properties:
                    document_id:    { type: string }
                    loan_id:        { type: string }
                    uploaded_by:    { type: string }
                    uploaded_by_name: { type: string }
                    s3_key:         { type: string }
                    document_type:  { type: string }
                    created_at:     { type: string }
              count:
                type: integer
    '401':
      description: Unauthorized.
    '403':
      description: Forbidden – clients can only view documents from their own loans.
    '404':
      description: Loan not found.
    '500':
      description: Internal server error.
